<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/header :: head('Transfer')}"/>
</head>
<body>
<th:block th:replace="~{fragments/header :: navbar}"/>

<div class="container">
    <div style="max-width: 520px; margin: 0 auto;">
        <div class="page-title">Pul Köçürmə</div>
        <div class="card">
            <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>
            <form method="post" th:action="@{/web/transactions/transfer}">
                <div class="form-group">
                    <label>Hesabım</label>
                    <select name="fromAccountId">
                        <option th:each="acc : ${accounts}"
                                th:value="${acc.id}"
                                th:text="${acc.iban} + ' — ' + ${acc.balance} + ' ' + ${acc.currency}">
                        </option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Göndərmə üsulu</label>
                    <select id="transferType" onchange="toggleTransferMethod()">
                        <option value="iban">IBAN ilə</option>
                        <option value="card">Kart nömrəsi ilə</option>
                    </select>
                </div>

                <div class="form-group" id="ibanGroup">
                    <label>Alan tərəfin IBAN-ı</label>
                    <input type="text" name="toIban" placeholder="AZNEO0000000000000000"/>
                </div>

                <div class="form-group" id="cardGroup" style="display:none;">
                    <label>Alan tərəfin Kart Nömrəsi</label>
                    <input type="text" name="toCardNumber" placeholder="4169 73XX XXXX XXXX"/>
                </div>
                <div class="form-group">
                    <label>Məbləğ</label>
                    <input type="number" name="amount" step="0.01" min="0.01" placeholder="0.00" required/>
                </div>
                <div class="form-group">
                    <label>Açıqlama (ixtiyari)</label>
                    <input type="text" name="description" placeholder="Ödəniş məqsədi..."/>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; padding:0.85rem;">
                    Köçür
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    function toggleTransferMethod() {
        const type = document.getElementById('transferType').value;
        document.getElementById('ibanGroup').style.display = type === 'iban' ? 'block' : 'none';
        document.getElementById('cardGroup').style.display = type === 'card' ? 'block' : 'none';
    }
</script>

<th:block th:replace="~{fragments/footer :: footer}"/>
</body>
</html>
