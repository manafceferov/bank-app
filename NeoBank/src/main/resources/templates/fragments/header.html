<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} + ' | NeoBank'">NeoBank</title>
    <link rel="icon" type="image/png" th:href="@{/favicon.png}"/>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f0f13;
            --bg-secondary: #1a1a24;
            --bg-card: #22222f;
            --bg-hover: #2a2a3a;
            --accent: #6c63ff;
            --accent-hover: #5a52e0;
            --accent-green: #00d4aa;
            --accent-red: #ff4d6d;
            --accent-yellow: #ffd166;
            --text-primary: #f0f0f5;
            --text-secondary: #9999bb;
            --border: #2e2e42;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
        }

        body.light-mode {
            --bg-primary: #f4f4f8;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-hover: #ebebf5;
            --accent: #6c63ff;
            --accent-hover: #5a52e0;
            --accent-green: #00a884;
            --accent-red: #e03355;
            --accent-yellow: #e6a800;
            --text-primary: #1a1a2e;
            --text-secondary: #555577;
            --border: #dcdce8;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s, color 0.3s;
        }

        main, .container-wrapper {
            flex: 1;
        }

        nav {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
            transition: background-color 0.3s;
        }

        .nav-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            text-decoration: none;
            letter-spacing: 1px;
        }

        .nav-brand span {
            color: var(--accent-green);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--text-primary);
            background: var(--bg-hover);
        }

        .nav-user {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .nav-user span {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        /* Theme toggle button */
        .theme-toggle {
            background: var(--bg-hover);
            border: 1px solid var(--border);
            color: var(--text-primary);
            width: 38px;
            height: 38px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .theme-toggle:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .btn {
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-danger {
            background: transparent;
            color: var(--accent-red);
            border: 1px solid var(--accent-red);
        }

        .btn-danger:hover {
            background: var(--accent-red);
            color: white;
        }

        .btn-success {
            background: var(--accent-green);
            color: #0f0f13;
        }

        .btn-success:hover {
            opacity: 0.9;
        }

        .btn-outline {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
        }

        .btn-outline:hover {
            background: var(--accent);
            color: white;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            transition: background-color 0.3s;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1.5rem;
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: border 0.2s, background-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .alert {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .alert-error {
            background: rgba(255, 77, 109, 0.1);
            border: 1px solid var(--accent-red);
            color: var(--accent-red);
        }

        .alert-success {
            background: rgba(0, 212, 170, 0.1);
            border: 1px solid var(--accent-green);
            color: var(--accent-green);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th {
            text-align: left;
            padding: 0.75rem 1rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
        }

        table td {
            padding: 0.9rem 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }

        table tr:last-child td {
            border-bottom: none;
        }

        table tr:hover td {
            background: var(--bg-hover);
        }

        .badge {
            padding: 0.25rem 0.7rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-green {
            background: rgba(0, 212, 170, 0.15);
            color: var(--accent-green);
        }

        .badge-red {
            background: rgba(255, 77, 109, 0.15);
            color: var(--accent-red);
        }

        .badge-yellow {
            background: rgba(255, 209, 102, 0.15);
            color: var(--accent-yellow);
        }

        .badge-purple {
            background: rgba(108, 99, 255, 0.15);
            color: var(--accent);
        }

        .page-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            transition: background-color 0.3s;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-value.green {
            color: var(--accent-green);
        }

        .stat-value.purple {
            color: var(--accent);
        }

        footer {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 1.5rem 2rem;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
            transition: background-color 0.3s;
            margin-top: auto;
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        @media (max-width: 768px) {
            .grid-2, .grid-3, .grid-4 {
                grid-template-columns: 1fr;
            }

            .nav-links {
                display: none;
            }

            .container {
                padding: 1rem;
            }

            .footer-content {
                flex-direction: column;
                gap: 0.5rem;
            }
        }
    </style>

    <script>
        // Səhifə yüklənəndə modu tətbiq et
        (function () {
            const saved = localStorage.getItem('theme');
            if (saved === 'light') {
                document.documentElement.classList.add('light-mode-pending');
            }
        })();
    </script>
</head>

<header th:fragment="navbar">
    <nav>
        <a href="/" class="nav-brand">Neo<span>Bank</span></a>

        <ul class="nav-links">
            <li sec:authorize="isAuthenticated()">
                <a th:href="@{/dashboard}"
                   th:classappend="${currentPath == '/dashboard'} ? 'active'">
                    Dashboard
                </a>
            </li>
            <li sec:authorize="isAuthenticated()">
                <a th:href="@{/web/accounts}"
                   th:classappend="${currentPath != null and currentPath.startsWith('/web/accounts')} ? 'active'">
                    Hesablar
                </a>
            </li>
            <li sec:authorize="isAuthenticated()">
                <a th:href="@{/web/transactions/transfer}"
                   th:classappend="${currentPath != null and currentPath.startsWith('/web/transactions')} ? 'active'">
                    Transfer
                </a>
            </li>
            <li sec:authorize="isAuthenticated()">
                <a th:href="@{/web/credits}"
                   th:classappend="${currentPath != null and currentPath.startsWith('/web/credits')} ? 'active'">
                    Kreditlər
                </a>
            </li>
        </ul>

        <div class="nav-user">
            <a th:href="@{/web/profile}"
               sec:authorize="isAuthenticated()"
               th:text="${session.firstName} + ' ' + ${session.lastName}"
               style="color: var(--text-secondary); text-decoration: none; font-size: 0.85rem;
          padding: 0.4rem 0.8rem; border-radius: 8px; transition: all 0.2s;"
               onmouseover="this.style.background='var(--bg-hover)'; this.style.color='var(--text-primary)'"
               onmouseout="this.style.background='transparent'; this.style.color='var(--text-secondary)'">
            </a>

            <!-- Dark/Light toggle -->
            <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" title="Modu dəyiş">
                🌙
            </button>

            <a th:href="@{/logout}" class="btn btn-danger"
               sec:authorize="isAuthenticated()">Çıxış</a>
            <a th:href="@{/login}" class="btn btn-primary"
               sec:authorize="!isAuthenticated()">Giriş</a>
        </div>
    </nav>

    <script>
        // Səhifə yüklənəndə modu tətbiq et
        (function () {
            const saved = localStorage.getItem('theme');
            const btn = document.getElementById('themeBtn');
            if (saved === 'light') {
                document.body.classList.add('light-mode');
                if (btn) btn.textContent = '☀️';
            } else {
                if (btn) btn.textContent = '🌙';
            }
        })();

        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('themeBtn');
            const isLight = body.classList.toggle('light-mode');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            btn.textContent = isLight ? '☀️' : '🌙';
        }
    </script>
</header>
</html>
