<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<footer th:fragment="footer">
    <style>
        footer {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 1.5rem 2rem;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: auto;
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        footer a:hover { text-decoration: underline; }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        @media (max-width: 768px) {
            .footer-content { flex-direction: column; gap: 0.5rem; }
        }
    </style>
    <div class="footer-content">
        <span>© 2024 <strong style="color: var(--accent)">NeoBank</strong>. Bütün hüquqlar qorunur.</span>
        <span>
            <a href="/swagger-ui/index.html" target="_blank">API Docs</a>
        </span>
    </div>
</footer>
</html>
