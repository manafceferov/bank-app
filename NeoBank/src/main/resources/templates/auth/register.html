<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/header :: head('Qeydiyyat')}"/>
    <style>
        .auth-container {
            min-height: calc(100vh - 64px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .auth-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 480px;
            box-shadow: var(--shadow);
        }
        .auth-title { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.5rem; }
        .auth-subtitle { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 2rem; }
        .auth-footer { text-align: center; margin-top: 1.5rem; color: var(--text-secondary); font-size: 0.9rem; }
        .auth-footer a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>
<th:block th:replace="~{fragments/header :: navbar}"/>

<div class="auth-container">
    <div class="auth-box">
        <div class="auth-title">Qeydiyyat</div>
        <div class="auth-subtitle">Yeni hesab yaradın</div>

        <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

        <form method="post" th:action="@{/register}">
            <div class="grid-2">
                <div class="form-group">
                    <label>Ad</label>
                    <input type="text" name="firstName" placeholder="Adınız" required/>
                </div>
                <div class="form-group">
                    <label>Soyad</label>
                    <input type="text" name="lastName" placeholder="Soyadınız" required/>
                </div>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="email@example.com" required/>
            </div>
            <div class="form-group">
                <label>Şifrə</label>
                <input type="password" name="password" placeholder="••••••••" required/>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label>Telefon</label>
                    <input type="text" name="phoneNumber" placeholder="+994501234567"/>
                </div>
                <div class="form-group">
                    <label>FİN kod</label>
                    <input type="text" name="finCode" placeholder="1234567" maxlength="7"/>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.85rem;">
                Qeydiyyatdan keç
            </button>
        </form>

        <div class="auth-footer">
            Hesabınız var? <a th:href="@{/login}">Giriş</a>
        </div>
    </div>
</div>

<th:block th:replace="~{fragments/footer :: footer}"/>
</body>
</html>
