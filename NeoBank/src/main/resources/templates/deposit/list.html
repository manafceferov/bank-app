<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/header :: head('Əmanətlər')}"/>
</head>
<body>

<th:block th:replace="~{fragments/header :: navbar}"/>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
        <div class="page-title">
            Əmanətlərim
        </div>
    </div>
    <div class="card">
        <table>
            <thead>
            <tr>
                <th>Məbləğ</th>
                <th>Faiz</th>
                <th>Müddət</th>
                <th>Gözlənilən gəlir</th>
                <th>Başlama tarixi</th>
                <th>Bitmə tarixi</th>
                <th>Status</th>
                <th>Əməliyyat</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="deposit : ${deposits}">
                <td style="font-weight:700;"
                    th:text="${deposit.amount} + ' AZN'">
                </td>
                <td th:text="${deposit.interestRate} + '%'"></td>
                <td th:text="${deposit.durationMonths} + ' ay'"></td>
                <td style="color:var(--accent-green); font-weight:600;"
                    th:text="${deposit.expectedProfit} + ' AZN'">
                </td>
                <td th:text="${deposit.startDate}"></td>
                <td th:text="${deposit.endDate}"></td>
                <td>
                    <span class="badge"
                          th:classappend="${deposit.status == 'ACTIVE'} ? 'badge-green' : 'badge-red'"
                          th:text="${deposit.status}">
                    </span>
                </td>
                <td>
                    <form th:if="${deposit.status == 'ACTIVE'}"
                          th:action="@{/web/deposits/{id}/close(id=${deposit.id})}"
                          method="post">
                        <input type="hidden"
                               name="accountId"
                               th:value="${deposit.accountId}"/>
                        <button type="submit"
                                class="btn btn-danger"
                                style="padding:0.35rem 0.8rem; font-size:0.8rem;">
                            Bağla
                        </button>
                    </form>
                    <span th:if="${deposit.status != 'ACTIVE'}"
                          style="color:var(--text-secondary); font-size:0.85rem;">
                        —
                    </span>
                </td>
            </tr>
            <tr th:if="${deposits == null or deposits.isEmpty()}">
                <td colspan="8"
                    style="text-align:center; padding:2rem; color:var(--text-secondary);">
                    Aktiv əmanət yoxdur
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<th:block th:replace="~{fragments/footer :: footer}"/>

</body>
</html>
