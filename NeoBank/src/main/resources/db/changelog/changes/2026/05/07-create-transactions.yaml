databaseChangeLog:
  - changeSet:
      id: 07
      author: NeoBank
      changes:
        - createTable:
            tableName: transactions
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_transactions

              - column:
                  name: amount
                  type: DECIMAL(19,2)
                  constraints:
                    nullable: false

              - column:
                  name: currency
                  type: VARCHAR(3)
                  constraints:
                    nullable: false

              - column:
                  name: transaction_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false

              - column:
                  name: description
                  type: VARCHAR(255)

              - column:
                  name: reference_number
                  type: VARCHAR(255)
                  constraints:
                    unique: true

              - column:
                  name: from_account_id
                  type: BIGINT

              - column:
                  name: to_account_id
                  type: BIGINT

              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: TIMESTAMP

              - column:
                  name: deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: transactions
            baseColumnNames: from_account_id
            referencedTableName: accounts
            referencedColumnNames: id
            constraintName: fk_transactions_from_accounts

        - addForeignKeyConstraint:
            baseTableName: transactions
            baseColumnNames: to_account_id
            referencedTableName: accounts
            referencedColumnNames: id
            constraintName: fk_transactions_to_accounts