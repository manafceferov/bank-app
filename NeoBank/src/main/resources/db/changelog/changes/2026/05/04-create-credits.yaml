databaseChangeLog:
  - changeSet:
      id: 04
      author: NeoBank
      changes:
        - createTable:
            tableName: credits
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_credits

              - column:
                  name: amount
                  type: DECIMAL(19,2)
                  constraints:
                    nullable: false

              - column:
                  name: interest_rate
                  type: DECIMAL(5,2)
                  constraints:
                    nullable: false

              - column:
                  name: duration_months
                  type: INT
                  constraints:
                    nullable: false

              - column:
                  name: monthly_payment
                  type: DECIMAL(19,2)

              - column:
                  name: start_date
                  type: DATE

              - column:
                  name: end_date
                  type: DATE

              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: account_id
                  type: BIGINT

              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: TIMESTAMP

              - column:
                  name: deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: credits
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_credits_users

        - addForeignKeyConstraint:
            baseTableName: credits
            baseColumnNames: account_id
            referencedTableName: accounts
            referencedColumnNames: id
            constraintName: fk_credits_accounts