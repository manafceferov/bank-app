databaseChangeLog:
  - changeSet:
      id: 03
      author: NeoBank
      changes:
        - createTable:
            tableName: cards
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_cards

              - column:
                  name: card_number
                  type: VARCHAR(16)
                  constraints:
                    unique: true

              - column:
                  name: card_holder_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: expiry_date
                  type: DATE

              - column:
                  name: cvv
                  type: VARCHAR(3)

              - column:
                  name: card_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false

              - column:
                  name: account_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: TIMESTAMP

              - column:
                  name: deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: cards
            baseColumnNames: account_id
            referencedTableName: accounts
            referencedColumnNames: id
            constraintName: fk_cards_accounts