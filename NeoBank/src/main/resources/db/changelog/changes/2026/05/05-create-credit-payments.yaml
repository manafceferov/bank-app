databaseChangeLog:
  - changeSet:
      id: 05
      author: NeoBank
      changes:
        - createTable:
            tableName: credit_payments
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_credit_payments

              - column:
                  name: due_date
                  type: DATE
                  constraints:
                    nullable: false

              - column:
                  name: amount
                  type: DECIMAL(19,2)
                  constraints:
                    nullable: false

              - column:
                  name: paid
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

              - column:
                  name: paid_date
                  type: DATE

              - column:
                  name: credit_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: TIMESTAMP

              - column:
                  name: deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: credit_payments
            baseColumnNames: credit_id
            referencedTableName: credits
            referencedColumnNames: id
            constraintName: fk_credit_payments_credits